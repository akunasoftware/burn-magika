[graph]
targets = []
all-features = true

[output]
feature-depth = 1

[advisories]
ignore = []
unmaintained = "workspace"

[bans]
multiple-versions = "allow"

[licenses]
version = 2
confidence-threshold = 0.95
allow = [
  "MIT",
  "Apache-2.0",
  "BSL-1.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
exceptions = [
  # dev/test stack via magika and ort rustls TLS
  { allow = ["CDLA-Permissive-2.0"], name = "webpki-roots" },
]
